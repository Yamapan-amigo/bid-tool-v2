name: 入札情報収集 V2

on:
  schedule:
    # 毎朝8:00 JST (23:00 UTC前日)に実行
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: '取得するソース（空欄で全ソース、kkj / etokyo）'
        required: false
        default: ''

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install .

      - name: Create credentials file
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: printf '%s' "$GOOGLE_CREDENTIALS_JSON" > credentials.json

      - name: Run bid-tool-v2
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS_PATH: ./credentials.json
          INPUT_SOURCE: ${{ github.event.inputs.source }}
        run: |
          # Validate input to prevent shell injection
          case "$INPUT_SOURCE" in
            kkj|etokyo|"") ;;
            *) echo "Invalid source: $INPUT_SOURCE"; exit 1 ;;
          esac
          if [ -n "$INPUT_SOURCE" ]; then
            python -m src.main --source "$INPUT_SOURCE" -v
          else
            python -m src.main -v
          fi
